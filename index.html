<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistika 1 - Giriş</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-box" class="auth-container fade-in">
    <!-- Login Paneli (Struktur 1.1) -->
    <div id="login-form">
        <h2>Giriş</h2>
        <input type="email" id="login-email" placeholder="Mail və ya Telefon">
        <input type="password" id="login-pass" placeholder="Parol">
        <button class="btn-primary" onclick="login()">Giriş et</button>
        <p onclick="toggleAuth()" style="cursor:pointer; text-align:center; color:gray; margin-top:10px;">Qeydiyyatdan keç</p>
    </div>

    <!-- Qeydiyyat Paneli (Struktur 1.3) -->
    <div id="register-form" style="display: none;">
        <h2>Qeydiyyat</h2>
        <input type="text" id="name" placeholder="Ad">
        <input type="text" id="surname" placeholder="Soyad">
        <input type="tel" id="phone" placeholder="Əlaqə nömrəsi">
        <input type="email" id="reg-email" placeholder="Mail">
        <input type="text" id="address" placeholder="Yaşayış ünvanı">
        <input type="text" id="mmc" placeholder="MMC adı (varsa)">
        <input type="password" id="reg-pass" placeholder="Parol">
        <button class="btn-primary" onclick="sendCode()">Qeydiyyatdan keç</button>
        <p onclick="toggleAuth()" style="cursor:pointer; text-align:center; color:gray; margin-top:10px;">Geri qayıt</p>
    </div>

    <!-- Təsdiq Kodu (Struktur 1.3.8) -->
    <div id="verify-form" style="display: none;">
        <h2>Təsdiq Kodu</h2>
        <p>Mailinizə gələn 4 rəqəmli kodu daxil edin.</p>
        <input type="text" maxlength="4" id="code" placeholder="0000" style="text-align:center; font-size: 24px;">
        <button class="btn-primary" onclick="finishRegister()">Təsdiqlə</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
