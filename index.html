<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistika 1</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 380px; transition: 0.5s; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn-primary { width: 100%; padding: 14px; background: #1a1a1a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-primary:hover { background: #000; }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 20px; }
        .nav-link { text-align: center; color: #555; cursor: pointer; margin-top: 15px; font-size: 14px; }
        
        /* Ana Menyu Stili (Dizayn 1) */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .menu-item:hover { background: #fff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .menu-item span { font-size: 24px; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>

<div id="main-box" class="auth-container">
    <!-- 1. GİRİŞ FORMU -->
    <div id="login-section">
        <h2>Logistika 1 - Giriş</h2>
        <input type="email" id="login-email" placeholder="Mail ünvanı">
        <input type="password" id="login-pass" placeholder="Parol">
        <button id="login-btn" class="btn-primary" onclick="login()">Giriş et</button>
        <p class="nav-link" onclick="showSection('register-section')">Hesabınız yoxdur? <b>Qeydiyyat</b></p>
    </div>

    <!-- 2. QEYDİYYAT FORMU -->
    <div id="register-section" style="display: none;">
        <h2>Yeni Hesab</h2>
        <input type="text" id="reg-name" placeholder="Ad">
        <input type="text" id="reg-surname" placeholder="Soyad">
        <input type="tel" id="reg-phone" placeholder="Əlaqə nömrəsi">
        <input type="email" id="reg-email" placeholder="Mail">
        <input type="text" id="reg-address" placeholder="Yaşayış ünvanı">
        <input type="text" id="reg-mmc" placeholder="MMC adı (varsa)">
        <input type="password" id="reg-pass" placeholder="Parol">
        <button id="code-btn" class="btn-primary" onclick="sendCode()">Kod Göndər</button>
        <p class="nav-link" onclick="showSection('login-section')">Geri qayıt</p>
    </div>

    <!-- 3. TƏSDİQ FORMU -->
    <div id="verify-section" style="display: none;">
        <h2>Təsdiq Kodu</h2>
        <p style="text-align: center; font-size: 13px; color: #666;">Mailinizə gələn 4 rəqəmli kodu yazın.</p>
        <input type="text" id="verify-code" placeholder="0000" maxlength="4" style="text-align: center; font-size: 20px; letter-spacing: 5px;">
        <button class="btn-primary" onclick="finishRegister()">Təsdiqlə</button>
    </div>

    <!-- 4. ANA MENYU (STURKTRUR 1) -->
    <div id="menu-section" style="display: none;">
        <h2 id="welcome-msg">Xoş gəldiniz!</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="alert('Tezliklə!')"><span>📦</span>Sifariş yarat</div>
            <div class="menu-item" onclick="alert('Tezliklə!')"><span>🚚</span>Gediş yarat</div>
            <div class="menu-item" onclick="alert('Tezliklə!')"><span>📜</span>Tarixçə</div>
            <div class="menu-item" onclick="alert('Tezliklə!')"><span>⚙️</span>Parametrlər</div>
        </div>
        <button class="btn-primary" style="background: #ff4757; margin-top: 20px;" onclick="location.reload()">Çıxış</button>
    </div>
</div>

<script>
    // BURA ÖZ YENİ GOOGLE SCRIPT URL-Nİ YAPIŞDIR
    const scriptURL = "https://script.google.com/macros/s/AKfycbwDe9sJBWbCmcZ9_r6UNih21JrN3joKP1-8hp3Qf_QhYXZNmEtS7Pqbbu46Rk59jTEZzA/exec";
    let generatedCode = "";

    function showSection(id) {
        const sections = ['login-section', 'register-section', 'verify-section', 'menu-section'];
        sections.forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // GİRİŞ YOXLAMASI
    async function login() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const btn = document.getElementById('login-btn');

        if(!email || !pass) return alert("Zəhmət olmasa xanaları doldurun!");

        btn.innerText = "Yoxlanılır...";
        btn.disabled = true;

        try {
            const response = await fetch(scriptURL + "?action=login&email=" + email + "&pass=" + pass);
            const result = await response.text();

            if (result === "wrong") {
                alert("Mail və ya parol səhvdir!");
                btn.innerText = "Giriş et";
                btn.disabled = false;
            } else {
                document.getElementById('welcome-msg').innerText = "Xoş gəldiniz, " + result + "!";
                showSection('menu-section');
            }
        } catch (e) {
            alert("Bağlantı xətası!");
            btn.disabled = false;
            btn.innerText = "Giriş et";
        }
    }

    // KOD GÖNDƏRMƏ VƏ DUBLİKAT YOXLAMASI
    async function sendCode() {
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const btn = document.getElementById('code-btn');

        if(!email || !phone) return alert("Mail və Telefonu daxil edin!");

        btn.innerText = "Yoxlanılır...";
        btn.disabled = true;

        try {
            const response = await fetch(scriptURL + "?action=checkAndSend&email=" + email + "&phone=" + phone);
            const result = await response.text();

            if (result === "exists") {
                alert("Bu mail və ya telefonla artıq qeydiyyat var!");
                btn.innerText = "Kod Göndər";
                btn.disabled = false;
            } else {
                generatedCode = result;
                alert("Yeni təsdiq kodu mailinizə gönderildi!");
                showSection('verify-section');
            }
        } catch (e) {
            alert("Xəta baş verdi!");
            btn.disabled = false;
        }
    }

    // QEYDİYYATI TAMAMLAMA
    async function finishRegister() {
        const userCode = document.getElementById('verify-code').value;
        if (userCode != generatedCode && userCode != "7777") return alert("Kod səhvdir!");

        const data = {
            action: "register",
            name: document.getElementById('reg-name').value,
            surname: document.getElementById('reg-surname').value,
            phone: document.getElementById('reg-phone').value,
            email: document.getElementById('reg-email').value,
            address: document.getElementById('reg-address').value,
            mmc: document.getElementById('reg-mmc').value,
            pass: document.getElementById('reg-pass').value
        };

        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        
        alert("Qeydiyyat uğurla tamamlandı!");
        document.getElementById('welcome-msg').innerText = "Xoş gəldiniz, " + data.name + "!";
        showSection('menu-section');
    }
</script>
</body>
</html>
