<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistika 1</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 380px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 14px; background: #1a1a1a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        h2 { text-align: center; color: #1a1a1a; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .menu-item:hover { transform: translateY(-5px); background: #fff; }
    </style>
</head>
<body>

<div id="main-box" class="auth-container">
    <!-- GİRİŞ -->
    <div id="login-section">
        <h2>Giriş</h2>
        <input type="email" id="login-email" placeholder="Mail">
        <input type="password" id="login-pass" placeholder="Parol">
        <button class="btn-primary" onclick="login()">Giriş et</button>
        <p style="text-align:center; cursor:pointer;" onclick="showSection('register-section')">Qeydiyyat</p>
    </div>

    <!-- QEYDİYYAT -->
    <div id="register-section" style="display: none;">
        <h2>Qeydiyyat</h2>
        <input type="text" id="reg-name" placeholder="Ad">
        <input type="text" id="reg-surname" placeholder="Soyad">
        <input type="tel" id="reg-phone" placeholder="Telefon">
        <input type="email" id="reg-email" placeholder="Mail">
        <input type="text" id="reg-address" placeholder="Ünvan">
        <input type="text" id="reg-mmc" placeholder="MMC">
        <input type="password" id="reg-pass" placeholder="Parol">
        <button class="btn-primary" onclick="sendCode()">Kod Göndər</button>
    </div>

    <!-- TƏSDİQ -->
    <div id="verify-section" style="display: none;">
        <h2>Təsdiq Kodu</h2>
        <input type="text" id="verify-code" placeholder="0000" maxlength="4" style="text-align:center; font-size:24px;">
        <button class="btn-primary" onclick="finishRegister()">Təsdiqlə</button>
    </div>

    <!-- ANA MENYU -->
    <div id="menu-section" style="display: none;">
        <h2 id="welcome-msg">Xoş gəldiniz!</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="showSection('order-section')">📦<br>Sifariş yarat</div>
            <div class="menu-item">🚚<br>Gediş yarat</div>
            <div class="menu-item">📜<br>Tarixçə</div>
            <div class="menu-item">⚙️<br>Parametrlər</div>
        </div>
        <button class="btn-primary" style="background:red;" onclick="location.reload()">Çıxış</button>
    </div>

    <!-- SİFARİŞ YARATMA (Yeni Bölmə) -->
    <div id="order-section" style="display: none;">
        <h2>Yeni Sifariş</h2>
        <input type="text" id="ord-type" placeholder="Malın növü (məs: Qida)">
        <input type="text" id="ord-name" placeholder="Malın adı">
        <input type="text" id="ord-weight" placeholder="Çəkisi (kq/ton)">
        <input type="text" id="ord-volume" placeholder="Həcmi (m3)">
        <input type="text" id="ord-from" placeholder="Haradan">
        <input type="text" id="ord-to" placeholder="Haraya">
        <label style="font-size:12px;">Təhvil tarixi:</label>
        <input type="date" id="ord-start">
        <label style="font-size:12px;">Təslim tarixi:</label>
        <input type="date" id="ord-end">
        <input type="number" id="ord-price" placeholder="Büdcə (AZN)">
        <textarea id="ord-note" placeholder="Əlavə qeyd..."></textarea>
        <button id="order-btn" class="btn-primary" onclick="submitOrder()">Sifarişi Tamamla</button>
        <p style="text-align:center; cursor:pointer;" onclick="showSection('menu-section')">Geri</p>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwFAnRgwWMOZYu9mGJEP0rFvb_PT92hQWXzQec4YSggUL9vbwFbWhdUStYSpiEy8nvfZA/exec"; 

    function showSection(id) {
        const sections = ['login-section', 'register-section', 'verify-section', 'menu-section', 'order-section'];
        sections.forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    async function login() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const response = await fetch(scriptURL + "?action=login&email=" + email + "&pass=" + pass);
        const result = await response.text();
        if(result !== "wrong") {
            document.getElementById('welcome-msg').innerText = "Xoş gəldiniz, " + result + "!";
            showSection('menu-section');
        } else alert("Səhv!");
    }

    async function submitOrder() {
        const btn = document.getElementById('order-btn');
        const data = {
            action: "createOrder",
            userId: document.getElementById('login-email').value || "Qeydiyyatdan keçib",
            type: document.getElementById('ord-type').value,
            name: document.getElementById('ord-name').value,
            weight: document.getElementById('ord-weight').value,
            volume: document.getElementById('ord-volume').value,
            from: document.getElementById('ord-from').value,
            to: document.getElementById('ord-to').value,
            dateStart: document.getElementById('ord-start').value,
            dateEnd: document.getElementById('ord-end').value,
            price: document.getElementById('ord-price').value,
            note: document.getElementById('ord-note').value
        };

        btn.innerText = "Göndərilir...";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Sifariş Orders vərəqinə yazıldı!");
        showSection('menu-section');
        btn.innerText = "Sifarişi Tamamla";
    }

    // Digər funksiyalar (sendCode, finishRegister) eyni qaydada qalır...
</script>
</body>
</html>
