<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistika 1 - Giriş</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 350px; transition: 0.3s; }
        h2 { text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-box" class="auth-container fade-in">
    <!-- Giriş Paneli -->
    <div id="login-form">
        <h2>Giriş</h2>
        <input type="email" placeholder="Mail">
        <input type="password" placeholder="Parol">
        <button class="btn-primary" onclick="alert('Tezliklə!')">Giriş et</button>
        <p onclick="toggleAuth()" style="cursor:pointer; text-align:center; color:blue;">Qeydiyyatdan keç</p>
    </div>

    <!-- Qeydiyyat Paneli -->
    <div id="register-form" style="display: none;">
        <h2>Qeydiyyat</h2>
        <input type="text" id="name" placeholder="Ad">
        <input type="text" id="surname" placeholder="Soyad">
        <input type="email" id="reg-email" placeholder="Mail">
        <input type="tel" id="phone" placeholder="Telefon">
        <input type="text" id="address" placeholder="Ünvan">
        <input type="text" id="mmc" placeholder="MMC">
        <input type="password" id="reg-pass" placeholder="Parol">
        <button class="btn-primary" onclick="sendCode()">Kod Göndər</button>
        <p onclick="toggleAuth()" style="cursor:pointer; text-align:center;">Geri</p>
    </div>

    <!-- Təsdiq Paneli -->
    <div id="verify-form" style="display: none;">
        <h2>Təsdiq</h2>
        <input type="text" id="code" placeholder="0000">
        <button class="btn-primary" onclick="finishRegister()">Təsdiqlə</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwLyWEITVDplabph8M2HuuCnnuZQUk-UgVTTqqwcbgOYYEDVEc6FCLWldEFeyPYLbTu5Q/exec";

    function toggleAuth() {
        const login = document.getElementById('login-form');
        const reg = document.getElementById('register-form');
        login.style.display = login.style.display === "none" ? "block" : "none";
        reg.style.display = reg.style.display === "none" ? "block" : "none";
    }

    function sendCode() {
        const email = document.getElementById('reg-email').value;
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "sendCode", email: email}) });
        document.getElementById('register-form').style.display = "none";
        document.getElementById('verify-form').style.display = "block";
        alert("Kod göndərildi!");
    }

    function finishRegister() {
        const data = {
            action: "register",
            name: document.getElementById('name').value,
            surname: document.getElementById('surname').value,
            email: document.getElementById('reg-email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            mmc: document.getElementById('mmc').value,
            pass: document.getElementById('reg-pass').value
        };
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Məlumatlar cədvələ yazıldı!");
        window.location.reload();
    }
</script>
</body>
</html>
